<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catchup</title>
  <meta name="description" content="Catchup status page." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --ink: #e5eefc;
      --muted: #98a7c0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: grid;
      place-items: center;
    }

    main {
      width: min(92vw, 28rem);
      padding: 1rem;
      text-align: center;
    }

    p {
      margin: 0;
      font-size: clamp(1rem, 2.8vw, 1.25rem);
      font-weight: 600;
      color: var(--ink);
    }

    .subtle {
      margin-top: 0.4rem;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <main>
    <p id="status" aria-live="polite">Ready.</p>
    <p class="subtle" id="details">Catchup status only.</p>
  </main>

  <script type="module">
    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const setStatus = (message, detail) => {
      statusEl.textContent = message;
      detailsEl.textContent = detail;
    };

    if (!code) {
      setStatus("Missing code.", "Open `/catchup?code=CODE-HERE`.");
    } else {
      setStatus("Catchup active.", `Code ${code}.`);
    }
  </script>
</body>
</html>
