<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catchup</title>
  <meta name="description" content="Catchup Live" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(12, 20, 34, 0.88);
      --ink: #e5eefc;
      --muted: #98a7c0;
      --border: rgba(150, 178, 214, 0.18);
      --shadow: 0 20px 48px rgba(2, 8, 20, 0.36);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(99, 197, 218, 0.2), transparent 34%),
        radial-gradient(circle at 15% 80%, rgba(76, 124, 255, 0.16), transparent 28%),
        var(--bg);
      color: var(--ink);
    }

    main {
      width: min(420px, calc(100% - 2rem));
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--panel), rgba(10, 16, 28, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .status {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
    }
  </style>
</head>
<body>
  <main aria-live="polite">
    <h1 class="status" id="status">Working</h1>
    <p class="details" id="details" hidden></p>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, setDoc, serverTimestamp, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDKW2_pEyzm2HCek7kqOAHVle8yd5mnvp8",
      authDomain: "catchup-84e4c.firebaseapp.com",
      projectId: "catchup-84e4c",
      storageBucket: "catchup-84e4c.firebasestorage.app",
      messagingSenderId: "980602109655",
      appId: "1:980602109655:web:14754b72eb747c5749ba92"
    };

    const statusEl = document.getElementById("status");
    const detailsEl = document.getElementById("details");
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");

    const setStatus = (message, detail, isError = false) => {
      statusEl.textContent = message;
      detailsEl.hidden = !detail;
      detailsEl.textContent = detail || "";
      detailsEl.style.color = isError ? "#ffb4b4" : "";
    };

    const MAX_TRACKED_AGE_MS = 60 * 1000;
    const TARGETED_MOVEMENT_THRESHOLD_METERS = 10;
    const IDLE_MOVEMENT_THRESHOLD_METERS = 50;
    const TARGETED_SPEED_THRESHOLD_MPS = 1;
    const IDLE_SPEED_THRESHOLD_MPS = 10;
    const TARGETED_HEARTBEAT_INTERVAL_MS = 3 * 60 * 1000;
    const IDLE_HEARTBEAT_INTERVAL_MS = 30 * 60 * 1000;

    const getPoint = (coords) => ({
      latitude: coords.latitude,
      longitude: coords.longitude,
      speed: coords.speed ?? 0,
      heading: coords.heading ?? null,
      accuracy: coords.accuracy ?? null
    });

    const haversineMeters = (a, b) => {
      const rad = Math.PI / 180;
      const lat1 = a.latitude * rad;
      const lat2 = b.latitude * rad;
      const deltaLat = (b.latitude - a.latitude) * rad;
      const deltaLng = (b.longitude - a.longitude) * rad;
      const sinLat = Math.sin(deltaLat / 2);
      const sinLng = Math.sin(deltaLng / 2);
      const arc = sinLat * sinLat + Math.cos(lat1) * Math.cos(lat2) * sinLng * sinLng;
      return 6371000 * 2 * Math.atan2(Math.sqrt(arc), Math.sqrt(1 - arc));
    };

    const isTrackedFromDocument = (snapshot) => {
      const observedAt = snapshot?.data()?.observedAt;
      if (!observedAt?.toDate) {
        return false;
      }

      return Date.now() - observedAt.toDate().getTime() <= MAX_TRACKED_AGE_MS;
    };

    const getThresholds = (tracked) => ({
      movementThresholdMeters: tracked ? TARGETED_MOVEMENT_THRESHOLD_METERS : IDLE_MOVEMENT_THRESHOLD_METERS,
      speedThresholdMps: tracked ? TARGETED_SPEED_THRESHOLD_MPS : IDLE_SPEED_THRESHOLD_MPS,
      heartbeatIntervalMs: tracked ? TARGETED_HEARTBEAT_INTERVAL_MS : IDLE_HEARTBEAT_INTERVAL_MS
    });

    const buildFullTelemetryPayload = (point) => ({
      currentLatitude: point.latitude,
      currentLongitude: point.longitude,
      currentSpeedMPS: point.speed,
      currentHeadingDegrees: point.heading,
      kind: "telemetry",
      sentAt: serverTimestamp(),
      userID: code
    });

    const buildHeartbeatPayload = () => ({
      kind: "heartbeat",
      sentAt: serverTimestamp(),
      userID: code
    });

    if (!code) {
      setStatus("Error", "Missing code. Open `/catchup?code=CODE-HERE`.", true);
      throw new Error("Missing code query parameter");
    }

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const telemetryRef = doc(db, "catchupTelemetry", code);
    const state = {
      lastPoint: null,
      tracked: false,
      lastWriteAt: 0,
      heartbeatIntervalMs: IDLE_HEARTBEAT_INTERVAL_MS,
      movementThresholdMeters: IDLE_MOVEMENT_THRESHOLD_METERS,
      speedThresholdMps: IDLE_SPEED_THRESHOLD_MPS
    };

    setStatus("Working", ``);

    onSnapshot(telemetryRef, (snapshot) => {
      state.tracked = isTrackedFromDocument(snapshot);
      const thresholds = getThresholds(state.tracked);
      state.heartbeatIntervalMs = thresholds.heartbeatIntervalMs;
      state.movementThresholdMeters = thresholds.movementThresholdMeters;
      state.speedThresholdMps = thresholds.speedThresholdMps;
    });

    const writeDocument = async (payload, label) => {
      await setDoc(telemetryRef, payload, { merge: true });
      state.lastWriteAt = Date.now();
      setStatus("Working", ``);
    };

    const maybeWrite = async (point) => {
      const now = Date.now();

      if (!state.lastPoint) {
        state.lastPoint = point;
        await writeDocument(buildFullTelemetryPayload(point), "");
        return;
      }

      const movement = haversineMeters(state.lastPoint, point);
      const speedChangedEnough =
        point.speed === 0 ||
        state.lastPoint.speed === 0 ||
        Math.abs(point.speed - state.lastPoint.speed) >= state.speedThresholdMps;
      const shouldSendTelemetry = movement >= state.movementThresholdMeters || speedChangedEnough;
      const shouldSendHeartbeat = now - state.lastWriteAt >= state.heartbeatIntervalMs;

      if (shouldSendTelemetry) {
        state.lastPoint = point;
        await writeDocument(buildFullTelemetryPayload(point), `Telemetry sent (${movement.toFixed(1)} m)`);
        return;
      }

      if (shouldSendHeartbeat) {
        await writeDocument(buildHeartbeatPayload(), "Heartbeat sent");
      }
    };

    const requestPosition = () =>
      new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation is not available."));
          return;
        }

        navigator.geolocation.getCurrentPosition(resolve, reject, {
          enableHighAccuracy: true,
          maximumAge: 15000,
          timeout: 10000
        });
      });

    const handleError = (error) => {
      setStatus("Error", error?.message ? error.message : "Unknown error.", true);
    };

    const run = async () => {
      try {
        const position = await requestPosition();
        const point = getPoint(position.coords);
        await maybeWrite(point);

        navigator.geolocation.watchPosition(
          async (nextPosition) => {
            try {
              const nextPoint = getPoint(nextPosition.coords);
              await maybeWrite(nextPoint);
            } catch (error) {
              handleError(error);
            }
          },
          handleError,
          {
            enableHighAccuracy: true,
            maximumAge: 15000,
            timeout: 10000
          }
        );
      } catch (error) {
        handleError(error);
      }
    };

    run();
  </script>
</body>
</html>
