<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catchup</title>
  <meta name="description" content="Catchup status page." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08111f;
      --panel: rgba(12, 20, 34, 0.9);
      --ink: #e5eefc;
      --muted: #98a7c0;
      --border: rgba(150, 178, 214, 0.18);
      --shadow: 0 20px 48px rgba(2, 8, 20, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(99, 197, 218, 0.18), transparent 30%),
        var(--bg);
      color: var(--ink);
    }

    .card {
      width: min(420px, calc(100% - 2rem));
      padding: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: linear-gradient(180deg, var(--panel), rgba(10, 16, 28, 0.95));
      box-shadow: var(--shadow);
      text-align: center;
    }

    .status {
      margin: 0;
      font-size: clamp(2rem, 8vw, 3rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .error {
      margin: 0.75rem 0 0;
      color: var(--muted);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <h1 class="status" id="status">Working</h1>
    <p class="error" id="error" hidden></p>
  </main>

  <script>
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");

    const params = new URLSearchParams(window.location.search);
    const error = params.get("error");

    if (error) {
      statusEl.textContent = "Error";
      errorEl.hidden = false;
      errorEl.textContent = error;
    }
  </script>
</body>
</html>
